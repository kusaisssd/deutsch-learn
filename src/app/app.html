<!--
  الـ App component الجذري:
  - شريط علوي ثابت لكل الصفحات
  - <router-outlet /> يعرض الصفحة المناسبة حسب الـ URL
-->
<div class="min-h-screen bg-slate-50 flex flex-col">

  <!--
    Header — Mobile-first compact layout
    ────────────────────────────────────
    Mobile (< sm):  logo + tabs مكدسة عمودياً
                    · logo: شعار صغير + "Deutsch Learn" بـ text-xs
                    · tabs: grid-cols-5 → كل الـ5 ظاهرة، emoji فوق + text تحت
                    · لا scroll أفقي - كل شيء واضح من النظرة الأولى

    Desktop (sm+):  logo يسار + tabs أفقية يمين (pill bar نمط classic)

    Key insight: على الموبايل نُحوّل كل tab إلى bottom-nav style
    (نمط iOS/Android) بدل pill bar الأفقي → عرض أقل، ارتفاع بسيط.
  -->
  <header class="bg-emerald-600 text-white shadow-md">
    <div class="container mx-auto px-3 sm:px-6">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 py-2 sm:py-3">

        <!--
          Logo compact على الموبايل:
            · text-[11px] للعنوان (صغير لكن مقروء)
            · flag أصغر text-base (vs text-2xl)
            · subtitle مخفي
        -->
        <a
          [routerLink]="'/'"
          class="flex items-center justify-center sm:justify-start gap-1.5 sm:gap-2 hover:opacity-90 self-center sm:self-auto shrink-0"
        >
          <span class="text-base sm:text-2xl leading-none">🇩🇪</span>
          <div class="text-center sm:text-left">
            <h1 class="text-[11px] sm:text-xl font-bold leading-tight tracking-tight">
              Deutsch Learn
            </h1>
            <p class="text-emerald-100 text-xs hidden sm:block">
              Practice building German sentences
            </p>
          </div>
        </a>

        <!--
          Tabs container:
            mobile  → grid-cols-5 (5 أعمدة متساوية، كل الـtabs ظاهرة)
            desktop → flex (لاحقاً، حسب المساحة المتوفرة)
        -->
        <nav class="w-full sm:w-auto">
          <div class="grid grid-cols-6 sm:flex gap-1 bg-emerald-700/40 rounded-lg p-1">
            <!--
              كل tab:
                mobile  → flex-col (emoji فوق، text تحت)
                desktop → flex-row (emoji ↔ text بجانب بعض)
              النص يُسمح بالـwrap لـ2 سطر مع leading-tight (لـ"Conversations")
            -->
            <a
              [routerLink]="'/courses'"
              routerLinkActive="bg-emerald-800 shadow"
              class="flex flex-col sm:flex-row items-center justify-center gap-0.5 sm:gap-1.5 px-1 sm:px-4 py-1.5 rounded-md hover:bg-emerald-700 transition-colors text-center"
            >
              <span class="text-base sm:text-sm leading-none">🎓</span>
              <span class="text-[10px] sm:text-sm font-medium leading-tight">منهج كامل</span>
            </a>
            <a
              [routerLink]="'/levels'"
              routerLinkActive="bg-emerald-800 shadow"
              class="flex flex-col sm:flex-row items-center justify-center gap-0.5 sm:gap-1.5 px-1 sm:px-4 py-1.5 rounded-md hover:bg-emerald-700 transition-colors text-center"
            >
              <span class="text-base sm:text-sm leading-none">🎮</span>
              <span class="text-[10px] sm:text-sm font-medium leading-tight">Practice</span>
            </a>
            <a
              [routerLink]="'/topics'"
              routerLinkActive="bg-emerald-800 shadow"
              class="flex flex-col sm:flex-row items-center justify-center gap-0.5 sm:gap-1.5 px-1 sm:px-4 py-1.5 rounded-md hover:bg-emerald-700 transition-colors text-center"
            >
              <span class="text-base sm:text-sm leading-none">🧩</span>
              <span class="text-[10px] sm:text-sm font-medium leading-tight">Topics</span>
            </a>
            <a
              [routerLink]="'/cafe'"
              routerLinkActive="bg-emerald-800 shadow"
              class="flex flex-col sm:flex-row items-center justify-center gap-0.5 sm:gap-1.5 px-1 sm:px-4 py-1.5 rounded-md hover:bg-emerald-700 transition-colors text-center"
            >
              <span class="text-base sm:text-sm leading-none">☕</span>
              <span class="text-[10px] sm:text-sm font-medium leading-tight">Café&nbsp;Hope</span>
            </a>
            <a
              [routerLink]="'/conversations'"
              routerLinkActive="bg-emerald-800 shadow"
              class="flex flex-col sm:flex-row items-center justify-center gap-0.5 sm:gap-1.5 px-1 sm:px-4 py-1.5 rounded-md hover:bg-emerald-700 transition-colors text-center"
            >
              <span class="text-base sm:text-sm leading-none">💬</span>
              <!--
                Dual-span pattern: نُظهر صيغة مختلفة للموبايل و الديسكتوب
                لتجنّب hyphen literal يظهر على الديسكتوب.
              -->
              <span class="text-[10px] sm:text-sm font-medium leading-tight">
                <span class="sm:hidden">Conver-<br>sations</span>
                <span class="hidden sm:inline">Conversations</span>
              </span>
            </a>
            <a
              [routerLink]="'/reader'"
              routerLinkActive="bg-emerald-800 shadow"
              class="flex flex-col sm:flex-row items-center justify-center gap-0.5 sm:gap-1.5 px-1 sm:px-4 py-1.5 rounded-md hover:bg-emerald-700 transition-colors text-center"
            >
              <span class="text-base sm:text-sm leading-none">📖</span>
              <span class="text-[10px] sm:text-sm font-medium leading-tight">Reader</span>
            </a>
          </div>
        </nav>
      </div>
    </div>
  </header>

  <!--
    منطقة المحتوى - الـ router يعرض الصفحة هنا.
    p-4 على الموبايل (16px) لتوفير مساحة للمحتوى،
    sm:p-6 على الشاشات الأكبر (24px) للتنفس.
  -->
  <main class="container mx-auto p-4 sm:p-6 flex-1">
    <router-outlet />
  </main>

  <!--
    Footer with project info + Pro S team attribution.
    target="_blank" + rel="noopener noreferrer" = secure external link best practice.
  -->
  <footer class="bg-slate-200 text-slate-600 text-center text-sm py-3 space-y-1">
    <div>Deutsch Learn © 2026 — A learning project</div>
    <div>
      Developed by
      <a
        href="https://pro-sss.com"
        target="_blank"
        rel="noopener noreferrer"
        class="text-emerald-700 font-semibold hover:underline"
      >Pro S; team</a>
    </div>
  </footer>

</div>
