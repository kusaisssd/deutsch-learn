<!--
  الـ App component الجذري:
  - شريط علوي ثابت لكل الصفحات
  - <router-outlet /> يعرض الصفحة المناسبة حسب الـ URL
-->
<div class="min-h-screen bg-slate-50 flex flex-col">

  <!--
    Header — responsive layout
    ──────────────────────────
    Mobile (< sm):   logo و tabs مُكدّسة عمودياً
                     · logo في الأعلى (centered)
                     · tabs أسفل (scroll أفقي لو تجاوزت العرض)
    Desktop (sm+):   logo + tabs في صف واحد (logo يسار، tabs يمين)

    لماذا horizontal scroll بدل wrap؟
      · 5 tabs بـ"Café Hope" و "Conversations" لا تتسع لصف واحد على 375px
      · لو wrap → سطور غير متناسقة و header طويل بصرياً
      · scroll أفقي = نمط مألوف على الموبايل (swipe gesture)
  -->
  <header class="bg-emerald-600 text-white shadow-md">
    <div class="container mx-auto px-4 sm:px-6">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 py-3">

        <!-- Logo (centered on mobile, left on desktop) -->
        <a
          [routerLink]="'/'"
          class="flex items-center gap-2 hover:opacity-90 self-center sm:self-auto shrink-0"
        >
          <span class="text-2xl">🇩🇪</span>
          <div class="text-center sm:text-left">
            <h1 class="text-lg sm:text-xl font-bold leading-tight">Deutsch Learn</h1>
            <!-- subtitle مخفي على الموبايل لتوفير ارتفاع -->
            <p class="text-emerald-100 text-xs hidden sm:block">
              Practice building German sentences
            </p>
          </div>
        </a>

        <!--
          Tabs container — full-width pill bar on mobile, auto-width on desktop.
          flex justify-center → التبويبات في المنتصف على الموبايل
          max-w-full → يمنع overflow أن يكسر layout الـ header
        -->
        <nav class="flex justify-center sm:justify-end max-w-full">
          <!--
            داخلي يفعل scroll أفقي إن لزم:
              · overflow-x-auto → السكرول الأفقي
              · no-scrollbar    → يُخفي شريط التمرير بصرياً
              · max-w-full      → يحترم عرض الحاوية
          -->
          <div
            class="flex gap-1 bg-emerald-700/40 rounded-lg p-1 overflow-x-auto no-scrollbar max-w-full"
          >
            <a
              [routerLink]="'/levels'"
              routerLinkActive="bg-emerald-800 shadow"
              class="px-3 sm:px-4 py-1.5 rounded-md text-sm font-medium hover:bg-emerald-700 transition-colors whitespace-nowrap shrink-0"
            >
              🎮 Practice
            </a>
            <a
              [routerLink]="'/topics'"
              routerLinkActive="bg-emerald-800 shadow"
              class="px-3 sm:px-4 py-1.5 rounded-md text-sm font-medium hover:bg-emerald-700 transition-colors whitespace-nowrap shrink-0"
            >
              🧩 Topics
            </a>
            <a
              [routerLink]="'/cafe'"
              routerLinkActive="bg-emerald-800 shadow"
              class="px-3 sm:px-4 py-1.5 rounded-md text-sm font-medium hover:bg-emerald-700 transition-colors whitespace-nowrap shrink-0"
            >
              ☕ Café Hope
            </a>
            <a
              [routerLink]="'/conversations'"
              routerLinkActive="bg-emerald-800 shadow"
              class="px-3 sm:px-4 py-1.5 rounded-md text-sm font-medium hover:bg-emerald-700 transition-colors whitespace-nowrap shrink-0"
            >
              💬 Conversations
            </a>
            <a
              [routerLink]="'/reader'"
              routerLinkActive="bg-emerald-800 shadow"
              class="px-3 sm:px-4 py-1.5 rounded-md text-sm font-medium hover:bg-emerald-700 transition-colors whitespace-nowrap shrink-0"
            >
              📖 Reader
            </a>
          </div>
        </nav>
      </div>
    </div>
  </header>

  <!--
    منطقة المحتوى - الـ router يعرض الصفحة هنا.
    p-4 على الموبايل (16px) لتوفير مساحة للمحتوى،
    sm:p-6 على الشاشات الأكبر (24px) للتنفس.
  -->
  <main class="container mx-auto p-4 sm:p-6 flex-1">
    <router-outlet />
  </main>

  <!--
    Footer with project info + Pro S team attribution.
    target="_blank" + rel="noopener noreferrer" = secure external link best practice.
  -->
  <footer class="bg-slate-200 text-slate-600 text-center text-sm py-3 space-y-1">
    <div>Deutsch Learn © 2026 — A learning project</div>
    <div>
      Developed by
      <a
        href="https://pro-sss.com"
        target="_blank"
        rel="noopener noreferrer"
        class="text-emerald-700 font-semibold hover:underline"
      >Pro S; team</a>
    </div>
  </footer>

</div>
