<!--
  الـ App component الجذري:
  - شريط علوي ثابت لكل الصفحات
  - <router-outlet /> يعرض الصفحة المناسبة حسب الـ URL
-->
<div class="min-h-screen bg-slate-50 flex flex-col">

  <!-- Header -->
  <header class="bg-indigo-600 text-white py-4 px-6 shadow-md">
    <div class="container mx-auto flex items-center justify-between flex-wrap gap-3">
      <!-- شعار -->
      <a [routerLink]="'/levels'" class="flex items-center gap-2 hover:opacity-90">
        <span class="text-2xl">🇩🇪</span>
        <div>
          <h1 class="text-xl font-bold leading-tight">Deutsch Learn</h1>
          <p class="text-indigo-100 text-xs">Practice building German sentences</p>
        </div>
      </a>

      <!--
        Tabs للتنقل.
        routerLinkActive = directive تضيف class تلقائياً للرابط النشط حسب الـ URL.
        نعطيه class اسم نختاره (هنا 'bg-indigo-800') كي يبرز التبويب المفتوح.
      -->
      <nav class="flex gap-1 bg-indigo-700/40 rounded-lg p-1">
        <a
          [routerLink]="'/levels'"
          routerLinkActive="bg-indigo-800 shadow"
          class="px-4 py-1.5 rounded-md text-sm font-medium hover:bg-indigo-700 transition-colors"
        >
          🎮 Practice
        </a>
        <a
          [routerLink]="'/reader'"
          routerLinkActive="bg-indigo-800 shadow"
          class="px-4 py-1.5 rounded-md text-sm font-medium hover:bg-indigo-700 transition-colors"
        >
          📖 Reader
        </a>
      </nav>
    </div>
  </header>

  <!-- منطقة المحتوى - الـ router يعرض الصفحة هنا -->
  <main class="container mx-auto p-6 flex-1">
    <router-outlet />
  </main>

  <!-- Footer -->
  <footer class="bg-slate-200 text-slate-600 text-center text-sm py-3">
    Deutsch Learn © 2026 — A learning project
  </footer>

</div>
